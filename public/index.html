<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マーケ 朝礼当番</title>
  <style>
    :root {
      --blue:    #2563eb;
      --blue-bg: #eff6ff;
      --green:      #16a34a;
      --green-bg:   #dcfce7;
      --green-text: #166534;
      --orange:      #d97706;
      --orange-bg:   #fef3c7;
      --orange-text: #92400e;
      --purple:      #9333ea;
      --purple-bg:   #f3e8ff;
      --purple-text: #6b21a8;
      --red:    #dc2626;
      --gray-50:  #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans',
        'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      color: white;
      padding: 16px 16px 18px;
      text-align: center;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .header h1 { font-size: 19px; font-weight: 700; }
    .header p  { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    .container { max-width: 600px; margin: 0 auto; padding: 14px 12px 60px; }

    .sec-title {
      font-size: 11px; font-weight: 700; color: var(--gray-400);
      text-transform: uppercase; letter-spacing: 1px;
      padding: 0 4px; margin: 18px 0 7px;
    }
    .sec-toggle {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none; cursor: pointer; font-family: inherit;
      font-size: 11px; font-weight: 700; color: var(--gray-400);
      text-transform: uppercase; letter-spacing: 1px;
      padding: 0 4px; margin: 18px 0 7px;
    }

    .week-card {
      background: white; border-radius: 14px;
      overflow: hidden; margin-bottom: 12px;
      box-shadow: 0 3px 12px rgba(37,99,235,0.12);
      border: 2px solid var(--blue);
    }
    .week-card-head {
      background: var(--blue-bg);
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .week-card-label { font-size: 12px; font-weight: 700; color: var(--blue); }
    .week-card-dates { font-size: 12px; color: var(--gray-500); }

    .day-row {
      display: flex; align-items: center;
      padding: 11px 14px;
      border-bottom: 1px solid var(--gray-100);
      gap: 8px;
    }
    .day-row:last-child { border-bottom: none; }
    .day-row.today { background: #fefce8; }

    .day-label {
      width: 56px; flex-shrink: 0;
      font-size: 13px; font-weight: 600; color: var(--gray-500);
    }
    .day-label.today-label { color: var(--orange); }

    .day-main { flex: 1; min-width: 0; }
    .day-member {
      font-size: 16px; font-weight: 600; color: var(--gray-900);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .day-member .scheduled-strike {
      font-size: 12px; color: var(--gray-400); font-weight: 500;
      text-decoration: line-through;
    }
    .day-member .swap-arrow {
      color: var(--purple); font-weight: 700; margin: 0 2px; font-size: 13px;
    }
    .day-member span.suffix { font-size: 12px; color: var(--gray-400); font-weight: 400; margin-left: 1px; }
    .day-note {
      font-size: 11px; color: var(--purple); margin-top: 2px;
      font-weight: 500;
    }
    .day-note.gray { color: var(--gray-400); font-weight: 400; }

    .day-actions { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

    .sales-banner {
      background: white; border-radius: 14px;
      padding: 20px 16px; margin-bottom: 12px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      border: 2px solid var(--gray-200);
    }
    .sales-banner-icon { font-size: 32px; margin-bottom: 6px; }
    .sales-banner-text { font-size: 15px; color: var(--gray-500); }
    .sales-banner-date { font-size: 13px; color: var(--gray-400); margin-top: 3px; }

    .prestart-banner {
      background: white; border-radius: 14px;
      padding: 22px 16px; margin-bottom: 12px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .prestart-icon { font-size: 36px; margin-bottom: 8px; }
    .prestart-text { font-size: 15px; color: var(--gray-600); }
    .prestart-date { font-size: 20px; font-weight: 700; color: var(--blue); margin-top: 4px; }

    .upcoming-list {
      background: white; border-radius: 12px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .upcoming-item {
      display: flex; align-items: center;
      padding: 12px 14px; border-bottom: 1px solid var(--gray-100); gap: 10px;
    }
    .upcoming-item:last-child { border-bottom: none; }
    .upcoming-item.sales-item { background: var(--gray-50); }

    .upcoming-left { flex: 1; }
    .upcoming-dates { font-size: 11px; color: var(--gray-400); margin-bottom: 2px; }
    .upcoming-info  { font-size: 14px; font-weight: 600; color: var(--gray-700); }
    .upcoming-info.sales { color: var(--gray-400); font-weight: 500; }
    .upcoming-tag {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 99px; flex-shrink: 0;
    }
    .tag-mkt   { background: var(--blue-bg); color: var(--blue); }
    .tag-sales { background: var(--gray-100); color: var(--gray-400); }

    .btn {
      padding: 6px 10px; border-radius: 7px; font-size: 12px;
      font-weight: 600; border: none; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.75; }
    .btn-done   { background: var(--green); color: white; }
    .btn-skip   { background: var(--orange-bg); color: var(--orange-text); }
    .btn-cancel { background: var(--gray-200); color: var(--gray-700); }
    .btn-confirm { background: var(--blue); color: white; }
    .btn-purple { background: var(--purple); color: white; }

    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 8px; border-radius: 99px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .badge-pending   { background: var(--gray-100); color: var(--gray-500); }
    .badge-completed { background: var(--green-bg); color: var(--green-text); }
    .badge-skipped   { background: var(--orange-bg); color: var(--orange-text); }
    .badge-swap      { background: var(--purple-bg); color: var(--purple-text); }

    .undo-link {
      font-size: 11px; color: var(--blue); background: none;
      border: none; cursor: pointer; text-decoration: underline; font-family: inherit;
    }

    .rotation-hint {
      font-size: 11px; color: var(--gray-400); text-align: center;
      padding: 9px 12px; background: white;
      border-top: 1px dashed var(--gray-200); word-break: break-all;
    }

    .members-box {
      background: white; border-radius: 12px; padding: 16px;
      margin-top: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .members-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 11px; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 11px; }
    .chip {
      display: flex; align-items: center; gap: 5px;
      background: var(--gray-100); border-radius: 99px;
      padding: 5px 10px 5px 12px; font-size: 14px; font-weight: 500;
      cursor: grab; user-select: none;
    }
    .chip.dragging  { opacity: 0.35; }
    .chip.drag-over { outline: 2px dashed var(--blue); }
    .chip-x {
      width: 17px; height: 17px; border-radius: 50%;
      background: var(--gray-400); color: white; border: none;
      cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-family: inherit;
    }
    .chip-x:hover { background: var(--red); }
    .add-row { display: flex; gap: 7px; }
    .add-input {
      flex: 1; padding: 9px 12px;
      border: 1px solid var(--gray-300); border-radius: 8px;
      font-size: 15px; font-family: inherit; outline: none;
    }
    .add-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .add-btn {
      padding: 9px 15px; background: var(--blue); color: white;
      border: none; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .members-note { font-size: 11px; color: var(--gray-400); margin-top: 7px; }

    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: white; border-radius: 20px 20px 0 0;
      padding: 20px 18px 30px; width: 100%; max-width: 600px;
      transform: translateY(110%);
      transition: transform 0.26s cubic-bezier(0.4,0,0.2,1);
      max-height: 90vh; overflow-y: auto;
    }
    .overlay.open .modal { transform: translateY(0); }
    .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .modal-sub { font-size: 13px; color: var(--gray-500); margin-bottom: 16px; }

    .opt-list {
      display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 14px;
    }
    .opt {
      border: 1.5px solid var(--gray-200);
      border-radius: 10px; padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .opt:hover { border-color: var(--gray-400); }
    .opt.selected { border-color: var(--blue); background: var(--blue-bg); }
    .opt-title { font-size: 14px; font-weight: 700; color: var(--gray-800); }
    .opt-desc { font-size: 11px; color: var(--gray-500); margin-top: 3px; }
    .opt-select {
      margin-top: 8px;
      width: 100%; padding: 8px 10px;
      border: 1px solid var(--gray-300); border-radius: 7px;
      font-size: 14px; font-family: inherit; outline: none;
      background: white;
    }
    .opt-select:focus { border-color: var(--blue); }
    .opt-preview {
      font-size: 11px; color: var(--purple-text);
      margin-top: 6px; padding: 6px 8px;
      background: var(--purple-bg); border-radius: 6px;
    }

    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; color: var(--gray-600); margin-bottom: 4px; font-weight: 500; }
    .field select, .field textarea {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--gray-300); border-radius: 8px;
      font-size: 15px; font-family: inherit; outline: none;
    }
    .field textarea { resize: none; height: 60px; }

    .modal-btns { display: flex; gap: 9px; margin-top: 14px; }
    .modal-btns .btn { flex: 1; padding: 12px; font-size: 15px; }

    .toast {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--gray-800); color: white;
      padding: 10px 18px; border-radius: 10px; font-size: 14px;
      z-index: 200; transition: transform 0.25s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <h1>🎤 マーケ 朝礼当番</h1>
  <p>マーケティング部 ／ 1週おき交代制（平日毎日）</p>
</div>

<div class="container" id="app">
  <div style="text-align:center;padding:60px 0;color:#9ca3af;">読み込み中...</div>
</div>

<!-- Done modal -->
<div class="overlay" id="doneOverlay" onclick="closeOnBg(event,'doneOverlay')">
  <div class="modal">
    <h3>✅ 完了を記録</h3>
    <p class="modal-sub" id="doneInfo"></p>
    <div class="field">
      <label>実施者</label>
      <select id="doneBy"></select>
    </div>
    <div class="field">
      <label>メモ（任意）</label>
      <textarea id="doneNote" placeholder="何かあれば..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeOverlay('doneOverlay')">キャンセル</button>
      <button class="btn btn-confirm" onclick="confirmDone()">完了を記録</button>
    </div>
  </div>
</div>

<!-- Skip/Swap modal -->
<div class="overlay" id="skipOverlay" onclick="closeOnBg(event,'skipOverlay')">
  <div class="modal">
    <h3>⏭ スキップ・代行・交換</h3>
    <p class="modal-sub" id="skipInfo"></p>

    <div class="opt-list">
      <div class="opt" id="optHoliday" onclick="selectOpt('holiday')">
        <div class="opt-title">🏠 お休み（誰も対応しない）</div>
        <div class="opt-desc">この日は朝礼担当者なし</div>
      </div>

      <div class="opt" id="optCover" onclick="selectOpt('cover')">
        <div class="opt-title">🤝 代行してもらう（その日だけ）</div>
        <div class="opt-desc">他の人が代わりに対応。<strong>次回のローテーションは変わらない</strong></div>
        <select class="opt-select" id="coverPerson" onchange="event.stopPropagation();" onclick="event.stopPropagation();selectOpt('cover')"></select>
      </div>

      <div class="opt" id="optSwap" onclick="selectOpt('swap')">
        <div class="opt-title">🔄 番を交換する</div>
        <div class="opt-desc">代行してもらう代わりに、<strong>次回その人の番に自分が入る</strong></div>
        <select class="opt-select" id="swapPerson" onchange="updateSwapPreview();event.stopPropagation();" onclick="event.stopPropagation();selectOpt('swap')"></select>
        <div class="opt-preview" id="swapPreview" style="display:none;"></div>
      </div>
    </div>

    <div class="field">
      <label>メモ（任意）</label>
      <textarea id="skipNote" placeholder="理由など..."></textarea>
    </div>

    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeOverlay('skipOverlay')">キャンセル</button>
      <button class="btn btn-confirm" id="skipConfirmBtn" onclick="confirmSkip()" disabled>選択してください</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let data = null;
  let modalDate = null;
  let modalAssigned = null;
  let modalOption = null;  // 'holiday' | 'cover' | 'swap'
  let showPast = false;
  let dragIdx = null;

  const DAY_NAMES = ['日','月','火','水','木','金','土'];

  // ── Date helpers ─────────────────────────────────────
  function toStr(d) { return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
  function p2(n) { return String(n).padStart(2,'0'); }
  function parse(s) { return new Date(s + 'T00:00:00'); }

  function getMondayOf(dateStr) {
    const d = parse(dateStr);
    const day = d.getDay();
    d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
    return toStr(d);
  }
  function addDays(dateStr, n) {
    const d = parse(dateStr);
    d.setDate(d.getDate() + n);
    return toStr(d);
  }
  function addWeeks(mondayStr, n) { return addDays(mondayStr, n * 7); }
  function getFriday(mondayStr) { return addDays(mondayStr, 4); }
  function fmtMD(s) {
    const d = parse(s);
    return `${d.getMonth()+1}/${d.getDate()}`;
  }
  function fmtMDday(s) {
    const d = parse(s);
    return `${d.getMonth()+1}/${d.getDate()}(${DAY_NAMES[d.getDay()]})`;
  }
  function fmtFull(s) {
    const d = parse(s);
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  }
  function getWorkdays(mondayStr) {
    return [0,1,2,3,4].map(i => addDays(mondayStr, i));
  }

  // ── Rotation logic ───────────────────────────────────
  function weeksSinceStart(mondayStr) {
    const startMs = parse(data.startDate).getTime();
    const curMs   = parse(mondayStr).getTime();
    return Math.round((curMs - startMs) / (7 * 86400000));
  }
  function isMarketingWeek(mondayStr) {
    const w = weeksSinceStart(mondayStr);
    return w >= 0 && w % 2 === 0;
  }
  function getAssigned(dateStr) {
    // ローテーションに基づく「予定された」担当者
    if (!data.members.length) return null;
    const monday = getMondayOf(dateStr);
    const w = weeksSinceStart(monday);
    if (w < 0 || w % 2 !== 0) return null;
    const d = parse(dateStr);
    const dow = d.getDay();
    if (dow < 1 || dow > 5) return null;
    const mktWeekNum = w / 2;
    const dayOffset  = dow - 1;
    const slot = data.startMemberIndex + mktWeekNum * 5 + dayOffset;
    const idx  = ((slot % data.members.length) + data.members.length) % data.members.length;
    return data.members[idx];
  }
  function getDayRecord(dateStr) {
    return (data.dayRecords || {})[dateStr] || { status: 'pending' };
  }
  function getEffective(dateStr) {
    const rec = getDayRecord(dateStr);
    return rec.actualBy || getAssigned(dateStr);
  }

  // 指定メンバーの次のマーケ担当日を探す（指定日より後、最大90日先まで）
  function findNextScheduledDay(memberName, fromDateStr) {
    let cursor = fromDateStr;
    for (let i = 0; i < 90; i++) {
      cursor = addDays(cursor, 1);
      const assigned = getAssigned(cursor);
      if (assigned !== memberName) continue;
      const rec = getDayRecord(cursor);
      // すでに完了/スキップ/交換済みの日はスキップ
      if (rec.status && rec.status !== 'pending') continue;
      if (rec.swapWith) continue;
      return cursor;
    }
    return null;
  }

  // ── API ──────────────────────────────────────────────
  async function fetchData() {
    try {
      const res = await fetch('/api/data');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
      if (!data.dayRecords) data.dayRecords = {};
      render();
    } catch (e) {
      console.error('Load error:', e);
      document.getElementById('app').innerHTML =
        '<div style="text-align:center;padding:40px;color:#dc2626;">読み込みエラー：' + e.message + '</div>';
    }
  }
  async function apiDay(date, record) {
    const r = await fetch('/api/day', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date, record })
    });
    if (!r.ok) throw new Error('Save failed');
    await fetchData();
  }
  async function apiSwap(dateA, recordA, dateB, recordB) {
    const r = await fetch('/api/swap', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dateA, recordA, dateB, recordB })
    });
    if (!r.ok) throw new Error('Swap save failed');
    await fetchData();
  }
  async function apiMembers(members) {
    const r = await fetch('/api/members', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ members })
    });
    if (!r.ok) throw new Error('Members save failed');
    await fetchData();
  }

  // ── Toast ────────────────────────────────────────────
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2800);
  }

  // ── Modal ────────────────────────────────────────────
  function openOverlay(id)  { document.getElementById(id).classList.add('open'); }
  function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
  function closeOnBg(e, id) { if (e.target === e.currentTarget) closeOverlay(id); }

  function openDoneModal(dateStr, assigned) {
    modalDate = dateStr; modalAssigned = assigned;
    document.getElementById('doneInfo').textContent = `${fmtMDday(dateStr)}　予定: ${assigned}さん`;
    const sel = document.getElementById('doneBy');
    sel.innerHTML = '';
    const effective = getEffective(dateStr) || assigned;
    data.members.forEach(m => {
      sel.innerHTML += `<option value="${m}" ${m === effective ? 'selected' : ''}>${m}さん</option>`;
    });
    document.getElementById('doneNote').value = '';
    openOverlay('doneOverlay');
  }

  function openSkipModal(dateStr, assigned) {
    modalDate = dateStr; modalAssigned = assigned;
    modalOption = null;
    document.getElementById('skipInfo').textContent = `${fmtMDday(dateStr)}　担当: ${assigned}さん`;

    // selectsを準備
    const others = data.members.filter(m => m !== assigned);
    const coverSel = document.getElementById('coverPerson');
    const swapSel  = document.getElementById('swapPerson');
    coverSel.innerHTML = others.map(m => `<option value="${m}">${m}さん</option>`).join('');
    swapSel.innerHTML  = others.map(m => `<option value="${m}">${m}さん</option>`).join('');

    document.getElementById('skipNote').value = '';
    document.getElementById('swapPreview').style.display = 'none';
    document.querySelectorAll('.opt').forEach(el => el.classList.remove('selected'));
    document.getElementById('skipConfirmBtn').disabled = true;
    document.getElementById('skipConfirmBtn').textContent = '選択してください';

    openOverlay('skipOverlay');
  }

  function selectOpt(opt) {
    modalOption = opt;
    document.querySelectorAll('.opt').forEach(el => el.classList.remove('selected'));
    document.getElementById('opt' + opt.charAt(0).toUpperCase() + opt.slice(1)).classList.add('selected');

    const btn = document.getElementById('skipConfirmBtn');
    btn.disabled = false;
    if (opt === 'holiday') btn.textContent = '休みとして記録';
    else if (opt === 'cover') btn.textContent = '代行を記録';
    else if (opt === 'swap')  btn.textContent = '交換を記録';

    if (opt === 'swap') updateSwapPreview();
    else document.getElementById('swapPreview').style.display = 'none';
  }

  function updateSwapPreview() {
    const partner = document.getElementById('swapPerson').value;
    if (!partner) return;
    const nextDate = findNextScheduledDay(partner, modalDate);
    const preview = document.getElementById('swapPreview');
    if (!nextDate) {
      preview.style.display = 'block';
      preview.textContent = `⚠️ ${partner}さんの次の担当日が見つかりません（90日以内）`;
      preview.style.background = '#fef2f2';
      preview.style.color = '#991b1b';
    } else {
      preview.style.display = 'block';
      preview.innerHTML =
        `→ ${fmtMDday(modalDate)}は<strong>${partner}さん</strong>が対応<br>` +
        `→ ${fmtMDday(nextDate)}は<strong>${modalAssigned}さん</strong>が対応（交換）`;
      preview.style.background = 'var(--purple-bg)';
      preview.style.color = 'var(--purple-text)';
    }
  }

  async function confirmDone() {
    const by   = document.getElementById('doneBy').value;
    const note = document.getElementById('doneNote').value.trim();
    try {
      await apiDay(modalDate, {
        status: 'completed',
        actualBy: (by !== modalAssigned) ? by : null,
        note: note || null
      });
      closeOverlay('doneOverlay');
      toast('完了を記録しました ✅');
    } catch (e) {
      toast('保存失敗: ' + e.message);
    }
  }

  async function confirmSkip() {
    const note = document.getElementById('skipNote').value.trim();
    try {
      if (modalOption === 'holiday') {
        await apiDay(modalDate, {
          status: 'skipped',
          actualBy: null,
          swapWith: null,
          note: note || null
        });
        closeOverlay('skipOverlay');
        toast('お休みとして記録しました');
      } else if (modalOption === 'cover') {
        const cover = document.getElementById('coverPerson').value;
        await apiDay(modalDate, {
          status: 'completed',
          actualBy: cover,
          swapWith: null,
          note: note || null
        });
        closeOverlay('skipOverlay');
        toast(`${cover}さんの代行で記録しました`);
      } else if (modalOption === 'swap') {
        const partner = document.getElementById('swapPerson').value;
        const partnerDate = findNextScheduledDay(partner, modalDate);
        if (!partnerDate) {
          toast(`${partner}さんの次の担当日が見つかりません`);
          return;
        }
        // 交換は2日分まとめて更新
        await apiSwap(
          modalDate,
          { status: 'completed', actualBy: partner, swapWith: partnerDate, note: note || null },
          partnerDate,
          { status: 'pending', actualBy: modalAssigned, swapWith: modalDate, note: null }
        );
        closeOverlay('skipOverlay');
        toast(`${partner}さんと交換しました`);
      }
    } catch (e) {
      toast('保存失敗: ' + e.message);
    }
  }

  async function undoDay(dateStr) {
    const rec = getDayRecord(dateStr);
    try {
      if (rec.swapWith) {
        // 交換ペアの両方を取り消す
        const partnerDate = rec.swapWith;
        if (!confirm('交換ペアの両日を取り消します。よろしいですか？')) return;
        await apiSwap(
          dateStr,
          { status: 'pending', actualBy: null, swapWith: null, note: null },
          partnerDate,
          { status: 'pending', actualBy: null, swapWith: null, note: null }
        );
        toast('交換を取り消しました');
      } else {
        await apiDay(dateStr, { status: 'pending', actualBy: null, swapWith: null, note: null });
        toast('記録を取り消しました');
      }
    } catch (e) {
      toast('取消失敗: ' + e.message);
    }
  }

  // ── Display helpers ──────────────────────────────────
  function badgeHTML(rec) {
    if (rec.status === 'completed') return '<span class="badge badge-completed">✅ 完了</span>';
    if (rec.status === 'skipped')   return '<span class="badge badge-skipped">🏠 休み</span>';
    if (rec.swapWith)               return '<span class="badge badge-swap">🔄 交換予定</span>';
    return '<span class="badge badge-pending">📅 予定</span>';
  }

  function dayMemberHTML(scheduled, effective, rec) {
    if (effective === scheduled) {
      return `${scheduled}<span class="suffix">さん</span>`;
    }
    // 担当者が変わっている → 元の担当を取り消し線、実担当を太字
    return `<span class="scheduled-strike">${scheduled}</span><span class="swap-arrow">→</span>${effective}<span class="suffix">さん</span>`;
  }

  function noteFor(rec, scheduled) {
    if (rec.swapWith) {
      return `🔄 ${fmtMDday(rec.swapWith)}と交換`;
    }
    if (rec.actualBy && rec.actualBy !== scheduled && rec.status === 'completed') {
      return `🤝 ${scheduled}さんの代行`;
    }
    if (rec.note) return rec.note;
    return '';
  }

  function dayRowHTML(dateStr, today, interactive) {
    const scheduled = getAssigned(dateStr);
    if (!scheduled) return '';
    const rec = getDayRecord(dateStr);
    const effective = rec.actualBy || scheduled;
    const isToday = dateStr === today;

    const note = noteFor(rec, scheduled);
    const extraNote = rec.note && (rec.swapWith || (rec.actualBy && rec.actualBy !== scheduled))
      ? `<div class="day-note gray">${rec.note}</div>` : '';

    let actions = '';
    if (rec.status === 'pending') {
      if (interactive) {
        // 交換予定でも、完了/スキップボタンは表示する（badgeは冗長なので省略）
        actions = `
          <button class="btn btn-done" onclick="openDoneModal('${dateStr}','${scheduled}')">完了</button>
          <button class="btn btn-skip" onclick="openSkipModal('${dateStr}','${scheduled}')">スキップ</button>`;
      } else {
        actions = badgeHTML(rec);
      }
    } else {
      actions = `${badgeHTML(rec)}<button class="undo-link" onclick="undoDay('${dateStr}')">取消</button>`;
    }

    return `
      <div class="day-row${isToday ? ' today' : ''}">
        <div class="day-label${isToday ? ' today-label' : ''}">${fmtMD(dateStr)}(${DAY_NAMES[parse(dateStr).getDay()]})</div>
        <div class="day-main">
          <div class="day-member">${dayMemberHTML(scheduled, effective, rec)}</div>
          ${note ? `<div class="day-note">${note}</div>` : ''}
          ${extraNote}
        </div>
        <div class="day-actions">${actions}</div>
      </div>`;
  }

  function mktWeekSummary(mondayStr) {
    const days = getWorkdays(mondayStr);
    const names = days.map(d => getEffective(d)).filter(Boolean);
    if (!names.length) return '';
    const first = names[0], last = names[names.length-1];
    return first === last ? first+'さん×5日' : `${first}〜${last}さん`;
  }

  // ── Main render ──────────────────────────────────────
  function render() {
    const today       = toStr(new Date());
    const thisMonday  = getMondayOf(today);
    const startMonday = data.startDate;
    const beforeStart = parse(thisMonday) < parse(startMonday);

    let currentHTML = '';

    if (beforeStart) {
      currentHTML = `
        <div class="prestart-banner">
          <div class="prestart-icon">📅</div>
          <div class="prestart-text">ローテーション開始まで</div>
          <div class="prestart-date">${fmtFull(startMonday)}（月）から</div>
        </div>`;
    } else if (!isMarketingWeek(thisMonday)) {
      currentHTML = `
        <div class="sales-banner">
          <div class="sales-banner-icon">🏪</div>
          <div class="sales-banner-text">今週は<strong>営業担当週</strong>です</div>
          <div class="sales-banner-date">${fmtMD(thisMonday)}(月)〜${fmtMD(getFriday(thisMonday))}(金)</div>
        </div>`;
    } else {
      const days = getWorkdays(thisMonday);
      const dayRows = days.map(d => dayRowHTML(d, today, true)).join('');
      currentHTML = `
        <div class="week-card">
          <div class="week-card-head">
            <span class="week-card-label">🎯 今週 マーケ担当週</span>
            <span class="week-card-dates">${fmtMD(thisMonday)}(月)〜${fmtMD(getFriday(thisMonday))}(金)</span>
          </div>
          ${dayRows}
        </div>`;
    }

    // 次週以降（10週）
    const upcomingItems = [];
    for (let i = 1; i <= 10; i++) {
      const mon = addWeeks(thisMonday, i);
      const isMkt = isMarketingWeek(mon);
      if (isMkt) {
        const summary = mktWeekSummary(mon);
        upcomingItems.push(`
          <div class="upcoming-item">
            <div class="upcoming-left">
              <div class="upcoming-dates">${fmtMD(mon)}(月)〜${fmtMD(getFriday(mon))}(金)</div>
              <div class="upcoming-info">${summary}</div>
            </div>
            <span class="upcoming-tag tag-mkt">マーケ</span>
          </div>`);
      } else {
        upcomingItems.push(`
          <div class="upcoming-item sales-item">
            <div class="upcoming-left">
              <div class="upcoming-dates">${fmtMD(mon)}(月)〜${fmtMD(getFriday(mon))}(金)</div>
              <div class="upcoming-info sales">営業担当週</div>
            </div>
            <span class="upcoming-tag tag-sales">営業</span>
          </div>`);
      }
    }
    const rotationOrder = data.members.join(' → ');
    const upcomingHTML = `
      <div class="sec-title">次週以降</div>
      <div class="upcoming-list">
        ${upcomingItems.join('')}
        <div class="rotation-hint">マーケ順：${rotationOrder} → 繰り返し（1週おき5日分）</div>
      </div>`;

    // 過去
    const pastMondays = [];
    let pw = addWeeks(thisMonday, -1);
    for (let i = 0; i < 16; i++) {
      if (parse(pw) < parse(startMonday)) break;
      pastMondays.push(pw);
      pw = addWeeks(pw, -1);
    }
    let pastHTML = '';
    if (pastMondays.length) {
      let pastBody = '';
      if (showPast) {
        pastBody = `<div class="upcoming-list" style="margin-bottom:0;">
          ${pastMondays.map(mon => {
            const isMkt = isMarketingWeek(mon);
            if (!isMkt) return `
              <div class="upcoming-item sales-item">
                <div class="upcoming-left">
                  <div class="upcoming-dates">${fmtMD(mon)}(月)〜${fmtMD(getFriday(mon))}(金)</div>
                  <div class="upcoming-info sales">営業担当週</div>
                </div>
                <span class="upcoming-tag tag-sales">営業</span>
              </div>`;
            const days = getWorkdays(mon);
            const dayRows = days.map(d => dayRowHTML(d, today, true)).join('');
            return `
              <div style="border-bottom:1px solid var(--gray-100);">
                <div style="padding:8px 14px;background:var(--blue-bg);font-size:11px;font-weight:700;color:var(--blue);">
                  ${fmtMD(mon)}(月)〜${fmtMD(getFriday(mon))}(金) マーケ
                </div>
                ${dayRows}
              </div>`;
          }).join('')}
        </div>`;
      }
      pastHTML = `
        <button class="sec-toggle" onclick="togglePast()">
          <span>${showPast ? '▼' : '▶'}</span> 過去の記録（${pastMondays.length}週）
        </button>
        ${pastBody}`;
    }

    // メンバー管理
    const chips = data.members.map((m, i) => `
      <div class="chip" draggable="true" data-index="${i}"
           ondragstart="ds(event,${i})" ondragover="dov(event,${i})"
           ondrop="dp(event,${i})" ondragend="de(event)">
        <span>${m}</span>
        <button class="chip-x" onclick="removeMember(${i})">×</button>
      </div>`).join('');

    const membersHTML = `
      <div class="members-box">
        <h3>👥 メンバー管理</h3>
        <div class="chips">${chips}</div>
        <div class="add-row">
          <input class="add-input" type="text" id="newName" placeholder="名前を入力..." maxlength="10"
            onkeypress="if(event.key==='Enter')addMember()">
          <button class="add-btn" onclick="addMember()">+ 追加</button>
        </div>
        <p class="members-note">※ ドラッグで順番変更。削除すると今後のローテーションに反映されます。</p>
      </div>`;

    document.getElementById('app').innerHTML =
      currentHTML + upcomingHTML + pastHTML + membersHTML + '<div style="height:40px;"></div>';
  }

  function togglePast() { showPast = !showPast; render(); }

  async function removeMember(i) {
    if (data.members.length <= 1) { toast('最低1人は必要です'); return; }
    if (!confirm(`${data.members[i]}さんを削除しますか？`)) return;
    const name = data.members[i];
    await apiMembers(data.members.filter((_,j) => j!==i));
    toast(`${name}さんを削除しました`);
  }
  async function addMember() {
    const inp  = document.getElementById('newName');
    const name = inp.value.trim();
    if (!name) { toast('名前を入力してください'); return; }
    if (data.members.includes(name)) { toast(`${name}さんは既に登録済みです`); return; }
    await apiMembers([...data.members, name]);
    inp.value = '';
    toast(`${name}さんを追加しました`);
  }

  function ds(e,i) { dragIdx=i; e.currentTarget.classList.add('dragging'); }
  function dov(e,i) {
    e.preventDefault();
    document.querySelectorAll('.chip').forEach(el=>el.classList.remove('drag-over'));
    if (i!==dragIdx) e.currentTarget.classList.add('drag-over');
  }
  async function dp(e,i) {
    e.preventDefault();
    if (dragIdx===null||dragIdx===i) return;
    const arr=[...data.members];
    const [m]=arr.splice(dragIdx,1);
    arr.splice(i,0,m);
    await apiMembers(arr);
    toast('順番を変更しました');
    dragIdx=null;
  }
  function de(e) {
    dragIdx=null;
    document.querySelectorAll('.chip').forEach(el=>el.classList.remove('dragging','drag-over'));
  }

  fetchData();
  setInterval(fetchData, 30000);
</script>
</body>
</html>
